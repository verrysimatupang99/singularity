name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxtst-dev libpng-dev libxrandr-dev \
            libxss1 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libdrm2 libgbm1 libasound2

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build & publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && npx electron-builder --linux --publish always

      - name: Upload artifacts (fallback)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-packages-${{ github.ref_name }}
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml
          retention-days: 30

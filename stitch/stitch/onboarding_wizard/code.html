<!-- Ambient Background Glows -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[150px]"></div>

<!-- Header Section -->
<header class="mb-12 text-center max-w-2xl">
<h1 class="font-headline italic text-5xl md:text-7xl text-on-surface tracking-tight mb-4">
                The Glasswing Protocol
            </h1>
<p class="text-on-surface-variant font-medium tracking-wide uppercase text-[0.6875rem]">
                Singularity Onboarding — Sequence 02
            </p>
</header>
<!-- Central Card Container -->
<div class="w-full max-w-5xl glass-panel border border-outline-variant/20 rounded-lg overflow-hidden shadow-2xl">
<div class="p-8 md:p-12 border-b border-outline-variant/10">
<div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
<div>
<h2 class="font-headline text-3xl md:text-4xl text-on-surface mb-2">Choose your AI engines</h2>
<p class="text-on-surface-variant text-sm max-w-md">Select the primary models to power your development cycle. You can swap providers dynamically within the editor.</p>
</div>
<!-- Progress Dots -->
<div class="flex items-center gap-3 pb-2">
<div class="w-2 h-2 rounded-full bg-on-surface/20"></div>
<div class="w-8 h-1 rounded-full lithium-glow"></div>
<div class="w-2 h-2 rounded-full bg-on-surface/20"></div>
</div>
</div>
</div>
<!-- Provider Grid -->
<div class="p-8 md:p-12 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
<!-- Anthropic (Selected) -->
<button class="relative flex flex-col p-6 rounded-lg bg-surface border-l-2 border-primary ring-1 ring-primary/30 transition-all text-left">
<div class="flex justify-between items-start mb-6">
<div class="w-10 h-10 rounded-sm bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<span class="text-[0.6rem] uppercase tracking-widest font-bold text-primary">Active</span>
</div>
<h3 class="text-lg font-medium text-on-surface mb-1">Anthropic</h3>

<span class="text-[0.6875rem] font-label uppercase text-on-surface-variant">Key Configured</span>
</div>
</button>

<span class="text-[0.6875rem] font-label uppercase text-on-surface-variant">API Key Required</span>

<span class="text-[0.6875rem] font-label uppercase text-on-surface-variant">API Key Required</span>
</div>

<span class="material-symbols-outlined text-on-surface-variant text-2xl">hub</span>
</div>
</div>

<span class="material-symbols-outlined text-xs text-on-surface-variant">radio</span>
<span class="text-[0.6875rem] font-label uppercase text-on-surface-variant">Ready to Connect</span>

<div class="w-10 h-10 rounded-sm bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">terminal</span>
</div>
</div>
<h3 class="text-lg font-medium text-on-surface mb-1">Local CLI</h3>
<p class="text-xs text-on-surface-variant mb-4">Ollama / Llama.cpp</p>
<div class="mt-auto flex items-center gap-2">
<span class="material-symbols-outlined text-xs text-on-surface-variant">lan</span>
<span class="text-[0.6875rem] font-label uppercase text-on-surface-variant">Localhost:11434</span>
</div>
</button>
</div>
<!-- Footer Controls -->
<div class="px-8 py-6 md:px-12 md:py-8 bg-surface-container-low flex flex-col sm:flex-row items-center justify-between gap-6 border-t border-outline-variant/10">

<span class="material-symbols-outlined text-on-surface-variant text-sm">shield_person</span>
<p class="text-[0.6rem] font-label uppercase tracking-widest text-on-surface-variant">Data encryption protocols active</p>
</div>
<div class="flex items-center gap-3 w-full sm:w-auto">
<button class="flex-1 sm:flex-none px-8 py-3 rounded-sm font-label text-[0.6875rem] uppercase font-bold tracking-[0.1em] text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest transition-colors">
                        Back

<button class="flex-1 sm:flex-none lithium-glow px-10 py-3 rounded-sm font-label text-[0.6875rem] uppercase font-bold tracking-[0.1em] text-on-primary-fixed shadow-lg shadow-primary/20 active:scale-95 transition-transform">
                        Continue

</div>
</div>

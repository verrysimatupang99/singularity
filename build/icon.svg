<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#615ef0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4285f4;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1e2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Outer gradient ring -->
  <circle
    cx="256" cy="256" r="200"
    fill="none"
    stroke="url(#ringGrad)"
    stroke-width="24"
  />

  <!-- Inner circle accent -->
  <circle
    cx="256" cy="256" r="140"
    fill="none"
    stroke="url(#ringGrad)"
    stroke-width="8"
    opacity="0.6"
  />

  <!-- Center dot -->
  <circle cx="256" cy="256" r="20" fill="url(#ringGrad)"/>

  <!-- Small accent dots at cardinal points -->
  <circle cx="256" cy="56" r="12" fill="#e94560" opacity="0.8"/>
  <circle cx="256" cy="456" r="12" fill="#4285f4" opacity="0.8"/>
  <circle cx="56" cy="256" r="12" fill="#615ef0" opacity="0.8"/>
  <circle cx="456" cy="256" r="12" fill="#e94560" opacity="0.8"/>
</svg>

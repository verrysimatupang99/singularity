<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Singularity</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body { background: #0d1117; }

      /* Markdown content styling */
      .markdown-content { word-wrap: break-word; overflow-wrap: break-word; }
      .markdown-content p { margin: 0 0 0.5em 0; }
      .markdown-content p:last-child { margin-bottom: 0; }
      .markdown-content strong { color: #e6edf3; }
      .markdown-content em { color: #c9d1d9; }
      .markdown-content a { color: #58a6ff; text-decoration: none; }
      .markdown-content a:hover { text-decoration: underline; }
      .markdown-content code {
        background: #1c2128;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
        font-size: 0.85em;
        color: #f0883e;
      }
      .markdown-content pre { margin: 0; }
      .markdown-content pre code {
        background: transparent;
        padding: 0;
        color: #c9d1d9;
        font-size: 0.85rem;
      }
      .markdown-content ul, .markdown-content ol { padding-left: 1.5em; margin: 0.5em 0; }
      .markdown-content li { margin: 0.25em 0; }
      .markdown-content blockquote {
        border-left: 3px solid #30363d;
        padding-left: 1em;
        margin: 0.5em 0;
        color: #8b949e;
      }
      .markdown-content h1, .markdown-content h2, .markdown-content h3 {
        margin: 0.75em 0 0.25em 0;
        color: #e6edf3;
      }
      .markdown-content h1 { font-size: 1.3em; }
      .markdown-content h2 { font-size: 1.15em; }
      .markdown-content h3 { font-size: 1.05em; }
      .markdown-content hr { border: none; border-top: 1px solid #30363d; margin: 1em 0; }
      .markdown-content table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
      .markdown-content th, .markdown-content td {
        border: 1px solid #30363d;
        padding: 6px 10px;
        text-align: left;
      }
      .markdown-content th { background: #161b22; color: #e6edf3; }

      /* Scrollbar styling */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #0d1117; }
      ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #484f58; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
